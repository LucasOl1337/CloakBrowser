<text x="56" y="221" font-size="13"><tspan class="nm" fill="#ffffff">Drop-in browser APIs </tspan><tspan class="sub" fill="#BDB6D8">— Playwright and Puppeteer-style calls keep working</tspan></text>
<text x="652" y="221" font-size="10.5" class="tag" fill="#7C7398" text-anchor="end">SDK</text>
